<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Tracker - Direct API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0f1a, #0f172a);
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #94a3b8; margin-bottom: 20px; }
        .card {
            background: rgba(30,41,59,0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: white;
        }
        button {
            padding: 12px 24px;
            background: #f59e0b;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .info-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            margin-top: 10px;
        }
        .error { color: #f87171; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #fbbf24; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏰 CoC Tracker</h1>
    <div class="sub">Direct API via Vercel Proxy | Token di JS</div>
    
    <div class="card">
        <div class="search-box">
            <input type="text" id="clanTag" placeholder="#2PPUJ9C88" value="#2PPUJ9C88">
            <button onclick="loadClan()">Cari Klan</button>
        </div>
        <div id="clanResult"></div>
    </div>
    
    <div class="card">
        <div class="search-box">
            <input type="text" id="playerTag" placeholder="#8GU9R0V">
            <button onclick="loadPlayer()">Cari Pemain</button>
        </div>
        <div id="playerResult"></div>
    </div>
</div>

<script>
// ============ TOKEN SUPERCELL (GANTI DENGAN TOKEN KAMU) ============
const TOKEN = "PASTE_TOKEN_PANJANG_KAMU_DISINI";
// ====================================================================

async function callAPI(endpoint) {
    const url = `/api/coc/${endpoint}`;
    const res = await fetch(url, {
        headers: { "Authorization": `Bearer ${TOKEN}` }
    });
    return res.json();
}

async function loadClan() {
    let tag = document.getElementById('clanTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('clanResult');
    div.innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const data = await callAPI(`clans/${encodeURIComponent(tag)}`);
        if (data.reason === 'accessDenied') throw new Error('Token tidak valid atau IP tidak diizinkan');
        if (data.error || data.reason) throw new Error(data.reason || data.message);
        
        div.innerHTML = `
            <div class="info-box">
                📛 <strong>${data.name}</strong> (${data.tag})<br>
                🏆 Level ${data.clanLevel} | 👥 ${data.members}/50<br>
                🏅 Trofi ${data.clanPoints?.toLocaleString()} | 🔥 Win Streak ${data.warWinStreak}
            </div>
        `;
    } catch (err) {
        div.innerHTML = `<div class="info-box error">❌ ${err.message}</div>`;
    }
}

async function loadPlayer() {
    let tag = document.getElementById('playerTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('playerResult');
    div.innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const data = await callAPI(`players/${encodeURIComponent(tag)}`);
        if (data.reason === 'accessDenied') throw new Error('Token tidak valid');
        if (data.error || data.reason) throw new Error(data.reason || data.message);
        
        div.innerHTML = `
            <div class="info-box">
                🎮 <strong>${data.name}</strong> (${data.tag})<br>
                🏠 TH${data.townHallLevel} | XP ${data.expLevel}<br>
                🏆 Trofi ${data.trophies} | ⭐ War ${data.warStars}
            </div>
        `;
    } catch (err) {
        div.innerHTML = `<div class="info-box error">❌ ${err.message}</div>`;
    }
}
</script>
</body>

<body>

    <h1>🏰 CoC Tracker</h1>
    
    <div class="status" id="statusPanel">📡 Panel: <span class="online">Checking...</span></div>

    <div>
        <button onclick="testPanel()">📡 Test Panel</button>
        <button onclick="loadStatus()">🔄 Load Status</button>
    </div>

    <div style="margin-top: 20px;">
        <input type="text" id="clanTag" placeholder="#2RGPJ8ROV" value="#2RGPJ8ROV">
        <button onclick="loadClan()">🏠 Cari Clan</button>
    </div>

    <div style="margin-top: 10px;">
        <input type="text" id="playerTag" placeholder="#8GU9R0V">
        <button onclick="loadPlayer()">🎮 Cari Player</button>
    </div>

    <pre id="result">Klik tombol di atas...</pre>

    <script>
        async function testPanel() {
            const pre = document.getElementById('result');
            pre.innerText = 'Loading...';
            try {
                const res = await fetch('/api/coc/status');
                const data = await res.json();
                pre.innerText = JSON.stringify(data, null, 2);
                
                // Update status panel
                const statusDiv = document.getElementById('statusPanel');
                if (data.token) {
                    statusDiv.innerHTML = `📡 Panel: <span class="online">● Online</span> | 🔑 Token: Ada | 🌐 IP: ${data.public_ip || data.local_ip}`;
                } else {
                    statusDiv.innerHTML = `📡 Panel: <span class="online">● Online</span> | 🔑 Token: <span style="color:#f87171;">Tidak ada</span>`;
                }
            } catch (err) {
                pre.innerText = 'Error: ' + err.message;
                document.getElementById('statusPanel').innerHTML = '📡 Panel: <span style="color:#f87171;">● Offline</span>';
            }
        }

        async function loadStatus() {
            await testPanel();
        }

        async function loadClan() {
            let tag = document.getElementById('clanTag').value.trim();
            if (!tag) return;
            if (!tag.startsWith('#')) tag = '#' + tag;
            
            const pre = document.getElementById('result');
            pre.innerText = 'Loading clan...';
            
            try {
                // Encode tag dengan benar
                const encodedTag = encodeURIComponent(tag);
                const res = await fetch(`/api/coc/clan?tag=${encodedTag}`);
                const data = await res.json();
                
                if (data.error) {
                    pre.innerText = 'Error: ' + (data.reason || 'Clan tidak ditemukan');
                    return;
                }
                
                pre.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                pre.innerText = 'Error: ' + err.message;
            }
        }

        async function loadPlayer() {
            let tag = document.getElementById('playerTag').value.trim();
            if (!tag) return;
            if (!tag.startsWith('#')) tag = '#' + tag;
            
            const pre = document.getElementById('result');
            pre.innerText = 'Loading player...';
            
            try {
                const encodedTag = encodeURIComponent(tag);
                const res = await fetch(`/api/coc/player?tag=${encodedTag}`);
                const data = await res.json();
                
                if (data.error) {
                    pre.innerText = 'Error: ' + (data.reason || 'Player tidak ditemukan');
                    return;
                }
                
                pre.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                pre.innerText = 'Error: ' + err.message;
            }
        }

        // Auto test panel saat halaman dibuka
        testPanel();
    </script>
</body>
</html>
