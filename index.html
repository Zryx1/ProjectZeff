<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }
        
        /* Status Bar */
        .status-bar {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .online { color: #4ade80; font-weight: bold; }
        .offline { color: #f87171; font-weight: bold; }
        
        /* Card */
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .card h3 {
            margin-bottom: 16px;
            color: #fbbf24;
            font-size: 1.2rem;
        }
        
        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }
        .search-box button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .search-box button:active { transform: scale(0.97); }
        
        /* Result Box */
        .result-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: auto;
        }
        .error {
            background: rgba(220,38,38,0.2);
            color: #f87171;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { color: #fbbf24; }
        
        /* War Score */
        .war-score {
            display: flex;
            justify-content: space-between;
            text-align: center;
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .team-score {
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(30,41,59,0.6);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .tab.active {
            background: #f59e0b;
            color: #0f172a;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 640px) {
            .status-bar { flex-direction: column; }
            .war-score { flex-direction: column; gap: 10px; }
            th, td { font-size: 11px; padding: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏰 CoC Tracker</h1>
        <p>Clash of Clans Web Tracker | Panel Connected</p>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">📡 Panel: <span id="panelStatus" class="offline">● Checking...</span></div>
        <div class="status-item">🔑 Token: <span id="tokenStatus">-</span></div>
        <div class="status-item">🌐 IP: <span id="ipStatus">-</span></div>
        <div class="status-item">
            <button onclick="checkPanel()" style="background:#3b82f6; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">Test Panel</button>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="clan">🏠 Clan</div>
        <div class="tab" data-tab="members">👥 Members</div>
        <div class="tab" data-tab="war">⚔️ War</div>
        <div class="tab" data-tab="player">🎮 Player</div>
    </div>
    
    <!-- Tab Clan -->
    <div id="tab-clan" class="tab-content active">
        <div class="card">
            <h3>🏠 Cari Klan</h3>
            <div class="search-box">
                <input type="text" id="clanTag" placeholder="Contoh: #2PPUJ9C88" value="#2PPUJ9C88">
                <button onclick="loadClan()">🔍 Cari</button>
            </div>
            <div id="clanResult" class="result-box">Masukkan tag klan</div>
        </div>
    </div>
    
    <!-- Tab Members -->
    <div id="tab-members" class="tab-content">
        <div class="card">
            <h3>👥 Daftar Anggota</h3>
            <div class="search-box">
                <input type="text" id="membersTag" placeholder="Tag Klan" value="#2PPUJ9C88">
                <button onclick="loadMembers()">🔍 Load</button>
            </div>
            <div id="membersResult" class="result-box">Masukkan tag klan</div>
        </div>
    </div>
    
    <!-- Tab War -->
    <div id="tab-war" class="tab-content">
        <div class="card">
            <h3>⚔️ War Aktif</h3>
            <div class="search-box">
                <input type="text" id="warTag" placeholder="Tag Klan" value="#2PPUJ9C88">
                <button onclick="loadWar()">🔍 Load</button>
            </div>
            <div id="warResult" class="result-box">Masukkan tag klan</div>
        </div>
    </div>
    
    <!-- Tab Player -->
    <div id="tab-player" class="tab-content">
        <div class="card">
            <h3>🎮 Cari Pemain</h3>
            <div class="search-box">
                <input type="text" id="playerTag" placeholder="Contoh: #8GU9R0V">
                <button onclick="loadPlayer()">🔍 Cari</button>
            </div>
            <div id="playerResult" class="result-box">Masukkan tag pemain</div>
        </div>
    </div>
</div>

<script>
// Panel URL (sudah diatur di vercel.json proxy)
const API_BASE = '/api/coc';

// ==================== CEK PANEL ====================
async function checkPanel() {
    const panelStatus = document.getElementById('panelStatus');
    const tokenSpan = document.getElementById('tokenStatus');
    const ipSpan = document.getElementById('ipStatus');
    
    panelStatus.innerHTML = '● Checking...';
    
    try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        panelStatus.innerHTML = '<span class="online">● Online</span>';
        tokenSpan.innerHTML = data.token ? '✅ Ada' : '❌ Tidak ada';
        ipSpan.innerHTML = data.public_ip || '-';
        return true;
    } catch (err) {
        panelStatus.innerHTML = '<span class="offline">● Offline</span>';
        tokenSpan.innerHTML = '❌ Gagal konek';
        ipSpan.innerHTML = '-';
        return false;
    }
}

// ==================== CLAN ====================
async function loadClan() {
    let tag = document.getElementById('clanTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('clanResult');
    div.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/clan?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        
        if (data.error || data.reason) {
            throw new Error(data.reason || data.message || 'Gagal ambil data');
        }
        
        div.innerHTML = `
            <strong>📛 ${data.name}</strong> (${data.tag})<br>
            🏆 Level ${data.clanLevel} | 👥 ${data.members}/50<br>
            🏅 Trofi ${data.clanPoints?.toLocaleString()} | 🔥 Win Streak ${data.warWinStreak}<br>
            📍 ${data.location?.name || '-'} | 🔒 ${data.type}
        `;
    } catch (err) {
        div.innerHTML = `<span class="error">❌ ${err.message}</span>`;
    }
}

// ==================== MEMBERS ====================
async function loadMembers() {
    let tag = document.getElementById('membersTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('membersResult');
    div.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/members?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        
        if (data.error || data.reason) throw new Error(data.reason || 'Gagal');
        if (!data.items || data.items.length === 0) throw new Error('Tidak ada anggota');
        
        let html = '<table><th>No</th><th>Nama</th><th>Role</th><th>TH</th><th>🏆</th><th>Donasi</th></tr>';
        data.items.forEach((m, i) => {
            let icon = { leader:'👑', coLeader:'⭐', admin:'🔹', member:'🟢' }[m.role] || '•';
            html += `<tr>
                <td>${i+1}</td>
                <td>${icon} ${m.name}</td>
                <td>${m.role}</td>
                <td>${m.townHallLevel}</td>
                <td>${m.trophies}</td>
                <td>${m.donations}</td>
            </tr>`;
        });
        html += '</table>';
        div.innerHTML = html;
    } catch (err) {
        div.innerHTML = `<span class="error">❌ ${err.message}</span>`;
    }
}

// ==================== WAR ====================
async function loadWar() {
    let tag = document.getElementById('warTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('warResult');
    div.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/war?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        
        if (data.error || data.reason) throw new Error(data.reason || 'Gagal');
        if (data.state !== 'inWar') {
            div.innerHTML = '<span>⚔️ Tidak ada war aktif</span>';
            return;
        }
        
        div.innerHTML = `
            <div class="war-score">
                <div><div class="team-score">${data.clan.stars}⭐</div><div>${data.clan.destructionPercentage}%</div></div>
                <div>VS</div>
                <div><div class="team-score">${data.opponent.stars}⭐</div><div>${data.opponent.destructionPercentage}%</div></div>
            </div>
            <div>⏰ Berakhir: ${data.endTime?.slice(0,16) || '-'}</div>
        `;
    } catch (err) {
        div.innerHTML = `<span class="error">❌ ${err.message}</span>`;
    }
}

// ==================== PLAYER ====================
async function loadPlayer() {
    let tag = document.getElementById('playerTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    
    const div = document.getElementById('playerResult');
    div.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/player?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        
        if (data.error || data.reason) throw new Error(data.reason || 'Gagal');
        
        div.innerHTML = `
            🎮 <strong>${data.name}</strong> (${data.tag})<br>
            🏠 TH${data.townHallLevel} | XP ${data.expLevel}<br>
            🏆 Trofi ${data.trophies} | ⭐ War ${data.warStars}<br>
            🤝 Donasi ${data.donations} | Terima ${data.donationsReceived}
        `;
    } catch (err) {
        div.innerHTML = `<span class="error">❌ ${err.message}</span>`;
    }
}

// ==================== TAB NAVIGATION ====================
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
});

// ==================== INIT ====================
checkPanel();
</script>
</body>
</html>
