<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Tracker - Central Command</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0f1a, #0f172a);
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #94a3b8; margin-bottom: 20px; }
        
        .status-bar {
            background: rgba(30,41,59,0.8);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .online { color: #4ade80; }
        .offline { color: #f87171; }
        
        .card {
            background: rgba(30,41,59,0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .panel-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            border-left: 4px solid #f59e0b;
        }
        .panel-card h3 { color: #fbbf24; margin-bottom: 10px; }
        .panel-card p { font-size: 12px; margin: 5px 0; }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: #f59e0b;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .info-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            line-height: 1.6;
        }
        .error { color: #f87171; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #fbbf24; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏰 CoC Tracker - Central Command</h1>
    <div class="sub">Botnet Style | Panel Auto Register | Real-time Data</div>
    
    <div class="status-bar">
        <span>📡 Panels: <span id="panelCount">0</span></span>
        <span>🔄 Auto Sync: <span id="syncStatus">-</span></span>
        <button onclick="refreshPanels()">🔄 Refresh Panels</button>
    </div>
    
    <div class="card">
        <h3>📋 Registered Panels</h3>
        <div id="panelsList" class="panel-grid">Loading...</div>
    </div>
    
    <div class="card">
        <h3>🏠 Cari Klan</h3>
        <div class="search-box">
            <input type="text" id="clanTag" placeholder="#2RGPJ8ROV">
            <button onclick="searchClan()">🔍 Search</button>
        </div>
        <div id="clanResult"></div>
    </div>
    
    <div class="card">
        <h3>🎮 Cari Pemain</h3>
        <div class="search-box">
            <input type="text" id="playerTag" placeholder="#8GU9R0V">
            <button onclick="searchPlayer()">🔍 Search</button>
        </div>
        <div id="playerResult"></div>
    </div>
    
    <div class="card">
        <h3>📊 Clan Data dari Panel (Auto Sync)</h3>
        <div id="panelData"></div>
    </div>
</div>

<script>
let panels = {};
let selectedPanel = null;

async function refreshPanels() {
    const res = await fetch('/api/register');
    const data = await res.json();
    panels = data.panels || {};
    
    document.getElementById('panelCount').innerHTML = Object.keys(panels).length;
    
    let html = '';
    for (const [id, panel] of Object.entries(panels)) {
        const lastSeen = new Date(panel.last_seen);
        const isOnline = (Date.now() - lastSeen) < 120000; // 2 menit
        html += `
            <div class="panel-card" onclick="selectPanel('${id}')" style="cursor:pointer;">
                <h3>🖥️ Panel ${id.substring(0,10)}... ${isOnline ? '<span class="online">● Online</span>' : '<span class="offline">● Offline</span>'}</h3>
                <p>🌐 IP: ${panel.public_ip || panel.local_ip}</p>
                <p>🔑 Token: ${panel.token_status ? '✅ Ada' : '❌ Tidak'}</p>
                <p>🕐 Last seen: ${panel.last_seen?.slice(0,19)}</p>
            </div>
        `;
    }
    document.getElementById('panelsList').innerHTML = html || '<p>Tidak ada panel terdaftar</p>';
    
    // Load data dari panel pertama
    const firstId = Object.keys(panels)[0];
    if (firstId) selectPanel(firstId);
}

async function selectPanel(panelId) {
    selectedPanel = panelId;
    document.getElementById('panelData').innerHTML = '<div class="loading">Loading panel data...</div>';
    
    try {
        const res = await fetch(`/api/submit?panel_id=${panelId}`);
        const data = await res.json();
        
        if (data.clan_data && data.clan_data.clan) {
            const clan = data.clan_data.clan;
            document.getElementById('panelData').innerHTML = `
                <div class="info-box">
                    <strong>📛 ${clan.name}</strong> (${clan.tag})<br>
                    🏆 Level ${clan.clanLevel} | 👥 ${clan.members}/50<br>
                    🏅 Trofi ${clan.clanPoints?.toLocaleString()} | 🔥 Win Streak ${clan.warWinStreak}<br>
                    📍 ${clan.location?.name || '-'}<br>
                    🕐 Last sync: ${data.last_update?.slice(0,19) || '-'}
                </div>
            `;
        } else {
            document.getElementById('panelData').innerHTML = '<div class="info-box">Belum ada data dari panel</div>';
        }
    } catch {
        document.getElementById('panelData').innerHTML = '<div class="error">Gagal load data panel</div>';
    }
}

async function searchClan() {
    const tag = document.getElementById('clanTag').value;
    if (!tag) return;
    if (!selectedPanel) { alert('Pilih panel dulu'); return; }
    
    const panel = panels[selectedPanel];
    if (!panel) { alert('Panel tidak ditemukan'); return; }
    
    const panelUrl = `http://${panel.public_ip || panel.local_ip}:${panel.port || 2868}`;
    
    document.getElementById('clanResult').innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const res = await fetch(`${panelUrl}/api/clan?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.reason);
        document.getElementById('clanResult').innerHTML = `
            <div class="info-box">
                📛 <strong>${data.name}</strong> (${data.tag})<br>
                🏆 Level ${data.clanLevel} | 👥 ${data.members}/50<br>
                🏅 Trofi ${data.clanPoints} | 🔥 Win Streak ${data.warWinStreak}
            </div>
        `;
    } catch (err) {
        document.getElementById('clanResult').innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

async function searchPlayer() {
    const tag = document.getElementById('playerTag').value;
    if (!tag) return;
    if (!selectedPanel) { alert('Pilih panel dulu'); return; }
    
    const panel = panels[selectedPanel];
    if (!panel) { alert('Panel tidak ditemukan'); return; }
    
    const panelUrl = `http://${panel.public_ip || panel.local_ip}:${panel.port || 2868}`;
    
    document.getElementById('playerResult').innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const res = await fetch(`${panelUrl}/api/player?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.reason);
        document.getElementById('playerResult').innerHTML = `
            <div class="info-box">
                🎮 <strong>${data.name}</strong> (${data.tag})<br>
                🏠 TH${data.townHallLevel} | XP ${data.expLevel}<br>
                🏆 Trofi ${data.trophies} | ⭐ War ${data.warStars}<br>
                🤝 Donasi ${data.donations} | Terima ${data.donationsReceived}
            </div>
        `;
    } catch (err) {
        document.getElementById('playerResult').innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

refreshPanels();
setInterval(refreshPanels, 30000);
</script>
</body>
</html>
