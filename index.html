<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CoC Tracker - Town Hall & Builder Hall Icons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left p {
            color: #64748b;
            font-size: 0.7rem;
        }
        .icon-notice {
            background: rgba(30,41,59,0.7);
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 11px;
            border: 1px solid rgba(251,191,36,0.3);
        }

        /* Status Bar */
        .status-bar {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .online { color: #4ade80; font-weight: 600; }
        .offline { color: #f87171; font-weight: 600; }

        /* Card */
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(251,191,36,0.15);
            transition: border 0.2s;
        }
        .card:hover {
            border-color: rgba(251,191,36,0.5);
        }
        .card-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-header h3 {
            color: #fbbf24;
            font-size: 1.1rem;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus {
            outline: 2px solid #f59e0b;
        }
        .search-box button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #0f172a;
        }

        /* Result */
        .result-box {
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        .error {
            background: rgba(220,38,38,0.15);
            color: #f87171;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            vertical-align: middle;
        }
        th {
            color: #fbbf24;
            font-weight: 600;
            font-size: 12px;
        }
        td {
            font-size: 13px;
        }
        .member-row {
            cursor: pointer;
            transition: background 0.1s;
        }
        .member-row:hover {
            background: rgba(251,191,36,0.1);
        }

        /* TH & BH Icons */
        .th-icon-micro, .bh-icon-micro {
            width: 26px;
            height: 26px;
            object-fit: contain;
            vertical-align: middle;
            margin-left: 6px;
        }
        .th-icon-medium, .bh-icon-medium {
            width: 42px;
            height: 42px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 10px;
        }
        .player-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.45);
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: bold;
            margin-bottom: 18px;
            margin-right: 12px;
        }

        /* Tag copy */
        .tag-copy {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .tag-copy:hover {
            background: #f59e0b;
            color: #0f172a;
        }

        .badge {
            background: rgba(251,191,36,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #fbbf24;
        }

        /* Progress bar */
        .progress-bar {
            background: #1e293b;
            border-radius: 10px;
            height: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            height: 100%;
            border-radius: 10px;
        }

        .back-btn {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 16px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab {
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        .tab.active {
            background: #f59e0b;
            color: #0f172a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .flex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        @media (max-width: 640px) {
            .th-icon-micro, .bh-icon-micro { width: 22px; height: 22px; }
            .th-icon-medium, .bh-icon-medium { width: 36px; height: 36px; }
            .search-box button { padding: 12px 20px; }
            .player-badge { padding: 4px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>🏰 Clash of Clans Tracker</h1>
            <p>Cari berdasarkan Tag atau Nama Klan | Th1-Th18.png | Bh1-Bh10.png</p>
        </div>
        <div class="icon-notice">
            📁 Town Hall: /Th-Level/Th1.png ... Th18.png &nbsp;|&nbsp;
            🏗️ Builder Hall: /Bh-Level/Bh1.png ... Bh10.png
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">📡 Panel: <span id="panelStatus" class="offline">● Offline</span></div>
        <div class="status-item">🔑 Token: <span id="tokenStatus">-</span></div>
        <button onclick="checkPanel()" style="background:#3b82f6; border:none; padding:4px 12px; border-radius:16px; font-size:11px; cursor:pointer;">Test</button>
    </div>

    <!-- Single Tab: Unified Search (Tag atau Nama Klan) -->
    <div class="card">
        <div class="card-header"><h3>🔍 Cari Klan / Pemain</h3></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Masukkan tag klan (#2PPUJ9C88) atau nama klan...">
            <button onclick="unifiedSearch()">🔍 Cari</button>
        </div>
        <div id="unifiedResult" class="result-box empty-state">Masukkan tag atau nama klan untuk melihat info & anggota</div>
    </div>
</div>

<script>
const API_BASE = '/api/coc';
let currentClanData = null;
let currentMembers = [];

// ========== ICON PATHS ==========
// Town Hall : Th1.png ... Th18.png
function getThIconUrl(level) {
    if (!level || level < 1) return '/Th-Level/Th1.png';
    if (level > 18) level = 18;
    return `/Th-Level/Th${level}.png`;
}
function thIconSmall(lvl) { if (!lvl || lvl<1) return ''; return `<img src="${getThIconUrl(lvl)}" class="th-icon-micro" alt="TH${lvl}" title="Town Hall ${lvl}" onerror="this.style.display='none';">`; }
function thIconMedium(lvl) { if (!lvl || lvl<1) return ''; return `<img src="${getThIconUrl(lvl)}" class="th-icon-medium" alt="TH${lvl}" title="Town Hall ${lvl}" onerror="this.style.display='none';">`; }

// Builder Hall : Bh1.png ... Bh10.png
function getBhIconUrl(level) {
    if (!level || level < 1) return '/Bh-Level/Bh1.png';
    if (level > 10) level = 10;
    return `/Bh-Level/Bh${level}.png`;
}
function bhIconSmall(lvl) { if (!lvl || lvl<1) return ''; return `<img src="${getBhIconUrl(lvl)}" class="bh-icon-micro" alt="BH${lvl}" title="Builder Hall ${lvl}" onerror="this.style.display='none';">`; }
function bhIconMedium(lvl) { if (!lvl || lvl<1) return ''; return `<img src="${getBhIconUrl(lvl)}" class="bh-icon-medium" alt="BH${lvl}" title="Builder Hall ${lvl}" onerror="this.style.display='none';">`; }

// Role mapping Indonesia
function mapRole(roleEn) {
    const map = { 'leader': 'Pemimpin', 'coLeader': 'Wakil Pemimpin', 'admin': 'Senior', 'member': 'Anggota' };
    return map[roleEn] || roleEn;
}
function translateAchievement(nameEn) {
    const dict = {
        'Bigger & Better': 'Lebih Besar & Lebih Baik', 'Nice and Tidy': 'Rapi dan Bersih',
        'Gold Rush': 'Demam Emas', 'Elixir Escapade': 'Petualangan Elixir',
        'Heroic Heist': 'Pencurian Heroik', 'Conqueror': 'Penakluk',
        'Unbreakable': 'Tak Terkalahkan', 'League All-Star': 'Bintang Liga',
        'War Hero': 'Pahlawan Perang', 'Aggressive Capitalism': 'Kapitalisme Agresif',
        'Sharing is Caring': 'Berbagi itu Peduli', 'Friend in Need': 'Teman dalam Kebutuhan',
        'Games Champion': 'Juara Permainan', 'Champion Builder': 'Pembangun Juara',
        'Clan Capital Enthusiast': 'Pecinta Ibu Kota', 'Well Seasoned': 'Berkualitas'
    };
    return dict[nameEn] || nameEn;
}

// ========== PANEL STATUS ==========
async function checkPanel() {
    const panelSpan = document.getElementById('panelStatus');
    const tokenSpan = document.getElementById('tokenStatus');
    panelSpan.innerHTML = '● Checking...';
    try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        panelSpan.innerHTML = '<span class="online">● Online</span>';
        tokenSpan.innerHTML = data.token ? '✅ Ada' : '❌ Tidak ada';
    } catch (err) {
        panelSpan.innerHTML = '<span class="offline">● Offline</span>';
        tokenSpan.innerHTML = '❌ Gagal';
    }
}

// ========== UNIFIED SEARCH ==========
async function unifiedSearch() {
    let query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    const div = document.getElementById('unifiedResult');
    div.innerHTML = '<div class="loading">⏳ Mencari...</div>';
    // Coba sebagai tag klan dulu (jika diawali # atau mengandung #)
    let isTag = query.startsWith('#');
    if (!isTag && query.includes('#')) isTag = true;
    if (isTag) {
        // treat as clan tag
        let tag = query;
        if (!tag.startsWith('#')) tag = '#' + tag;
        await loadClanByTag(tag);
    } else {
        // treat as clan name -> search by name via clan list? API tidak ada endpoint search by name, fallback ke tag?
        // kita coba gunakan search endpoint (tidak resmi) atau beri saran. Untuk kemudahan, kita langsung tanyakan ke user?
        // Tapi sesuai permintaan: cari tag atau nama klan disatukan. Karena API tidak punya pencarian nama, kita bantu dengan mencoba asumsikan sebagai tag atau beri opsi.
        div.innerHTML = `<div class="error">⚠️ Nama klan tidak bisa langsung dicari. Gunakan tag klan (contoh: #2PPUJ9C88). Jika ingin mencari berdasarkan nama, silakan cari tag-nya dulu.</div>`;
    }
}

async function loadClanByTag(tag) {
    const div = document.getElementById('unifiedResult');
    div.innerHTML = '<div class="loading">⏳ Loading clan...</div>';
    try {
        const clanRes = await fetch(`${API_BASE}/clan?tag=${encodeURIComponent(tag)}`);
        const clanData = await clanRes.json();
        if (clanData.error) throw new Error(clanData.reason || 'Gagal ambil clan');
        currentClanData = clanData;
        const membersRes = await fetch(`${API_BASE}/members?tag=${encodeURIComponent(tag)}`);
        const membersData = await membersRes.json();
        if (membersData.error) throw new Error(membersData.reason || 'Gagal ambil anggota');
        currentMembers = membersData.items || [];
        displayClanAndMembers(clanData, currentMembers);
    } catch (err) {
        div.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

function displayClanAndMembers(clan, members) {
    const div = document.getElementById('unifiedResult');
    let clanHtml = `
        <div style="margin-bottom:24px;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
                <strong style="font-size:20px;">${escapeHtml(clan.name)}</strong>
                <span class="badge">${clan.tag}</span>
                <span class="tag-copy" onclick="copyToClipboard('${clan.tag}')">📋 Copy Tag</span>
            </div>
            <div class="flex-grid">
                <div><span style="color:#94a3b8;">Level</span><br><strong>${clan.clanLevel}</strong></div>
                <div><span style="color:#94a3b8;">Anggota</span><br><strong>${clan.members}/50</strong></div>
                <div><span style="color:#94a3b8;">Trofi</span><br><strong>${clan.clanPoints?.toLocaleString()}</strong></div>
                <div><span style="color:#94a3b8;">Win Streak</span><br><strong>${clan.warWinStreak}</strong></div>
            </div>
            <div>📍 ${clan.location?.name || '-'} | 🔒 ${clan.type}</div>
            ${clan.description ? `<div style="margin-top:8px;">📝 ${escapeHtml(clan.description.substring(0, 100))}${clan.description.length > 100 ? '...' : ''}</div>` : ''}
        </div>
        <div><strong>👥 Anggota (${members.length})</strong></div>
        <div class="table-wrapper">
            <tr><thead><tr><th>No</th><th>Nama & TH/BH</th><th>Peran</th><th>🏆</th><th>Donasi</th></tr></thead><tbody>
    `;
    members.forEach((m, i) => {
        const icon = { leader:'👑', coLeader:'⭐', admin:'🔹', member:'🟢' }[m.role] || '•';
        const roleId = mapRole(m.role);
        const thIcon = thIconSmall(m.townHallLevel);
        // Builder Hall level tidak ada di member endpoint, hanya di player detail. sementara kita tidak tampilkan di daftar.
        clanHtml += `<tr class="member-row" onclick='showMemberDetail("${m.tag.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}", "${escapeHtml(m.name).replace(/'/g, "\\'")}")'>
            <td>${i+1}</td>
            <td>${icon} ${escapeHtml(m.name)} ${thIcon} (TH${m.townHallLevel})</td>
            <td>${roleId}</td>
            <td>${m.trophies.toLocaleString()}</td>
            <td>${m.donations.toLocaleString()}</td>
        </tr>`;
    });
    clanHtml += `</tbody></table></div><div style="margin-top:12px; text-align:center; font-size:11px;">✨ Klik anggota untuk lihat detail + pencapaian + Builder Hall ✨</div>`;
    div.innerHTML = clanHtml;
}

// ========== MEMBER DETAIL (dengan Builder Hall icon) ==========
async function showMemberDetail(tag, name) {
    const div = document.getElementById('unifiedResult');
    div.innerHTML = '<div class="loading">⏳ Loading profil...</div>';
    try {
        const res = await fetch(`${API_BASE}/player?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.reason || 'Gagal');
        
        const thMedium = thIconMedium(data.townHallLevel);
        const bhLevel = data.builderHallLevel || 0;
        const bhMedium = bhIconMedium(bhLevel);
        const builderTrophies = data.builderBaseTrophies || 0;
        const builderBest = data.bestBuilderBaseTrophies || 0;
        const versusWins = data.versusBattleWins || 0;

        let achievementsHtml = '';
        if (data.achievements && data.achievements.length) {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian</strong><div style="margin-top:12px;">';
            data.achievements.slice(0,15).forEach(ach => {
                const percent = (ach.value / ach.target) * 100;
                achievementsHtml += `
                    <div style="margin-bottom:14px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>${translateAchievement(ach.name)}</span>
                            <span>${ach.value.toLocaleString()}/${ach.target.toLocaleString()}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    </div>
                `;
            });
            achievementsHtml += '</div></div>';
        } else {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian</strong><div style="color:#64748b;">Belum ada achievement</div></div>';
        }

        let heroesHtml = '';
        if (data.heroes && data.heroes.length) {
            heroesHtml = '<div style="margin-top:20px;"><strong>🦸 Heroes</strong><div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;">';
            data.heroes.forEach(h => {
                if (h.village === 'home') {
                    heroesHtml += `<div style="background:#1e293b; padding:8px 12px; border-radius:12px;"><strong>${h.name}</strong><br>Lv ${h.level}/${h.maxLevel}</div>`;
                }
            });
            heroesHtml += '</div></div>';
        }

        div.innerHTML = `
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:6px;">
                    <strong style="font-size:20px;">🎮 ${escapeHtml(data.name)}</strong>
                    <span class="tag-copy" onclick="copyToClipboard('${data.tag}')">📋 Copy Tag</span>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
                    <div class="player-badge">${thMedium} Town Hall ${data.townHallLevel}</div>
                    ${bhLevel > 0 ? `<div class="player-badge">${bhMedium} Builder Hall ${bhLevel}</div>` : ''}
                </div>
                <div class="flex-grid">
                    <div><span style="color:#94a3b8;">Level XP</span><br><strong>${data.expLevel}</strong></div>
                    <div><span style="color:#94a3b8;">Trofi</span><br><strong>${data.trophies.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Best Trofi</span><br><strong>${data.bestTrophies?.toLocaleString() || '-'}</strong></div>
                    <div><span style="color:#94a3b8;">Bintang War</span><br><strong>${data.warStars}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi</span><br><strong>${data.donations.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi Terima</span><br><strong>${data.donationsReceived.toLocaleString()}</strong></div>
                </div>
                <div style="margin-top:16px; background:#1e293b; border-radius:16px; padding:12px;">
                    <strong>🏗️ BASIS TUKANG</strong><br>
                    Balai Tukang: ${bhLevel || 'Tidak memiliki'}<br>
                    Trofi Tukang: ${builderTrophies.toLocaleString()} (Best: ${builderBest.toLocaleString()})<br>
                    Kemenangan Versus: ${versusWins.toLocaleString()}
                </div>
                ${heroesHtml}
                ${achievementsHtml}
                <button class="back-btn" onclick="resetToEmpty()">← Kembali ke pencarian</button>
            </div>
        `;
    } catch (err) {
        div.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

function resetToEmpty() {
    document.getElementById('unifiedResult').innerHTML = '<div class="empty-state">Masukkan tag atau nama klan untuk memulai</div>';
    currentClanData = null;
    currentMembers = [];
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    const notif = document.createElement('div');
    notif.textContent = '✅ Tag disalin!';
    notif.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#f59e0b; color:#0f172a; padding:8px 20px; border-radius:40px; font-weight:bold; z-index:9999;';
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 1500);
}
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

checkPanel();
setInterval(checkPanel, 30000);
</script>
</body>
</html>
