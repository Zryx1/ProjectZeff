<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CoC Viewer Web - TH Icon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left p {
            color: #64748b;
            font-size: 0.7rem;
        }
               /* Status Bar */
        .status-bar {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border: 1px solid rgba(251,191,36,0.15);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .online { color: #4ade80; font-weight: 600; }
        .offline { color: #f87171; font-weight: 600; }
        
        /* Card */
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(251,191,36,0.1);
        }
        .card-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-header h3 {
            color: #fbbf24;
            font-size: 1.1rem;
        }
        
        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus {
            outline: 2px solid #f59e0b;
        }
        .search-box button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #0f172a;
        }
        .search-box button:active {
            transform: scale(0.97);
        }
        
        /* Result */
        .result-box {
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        .error {
            background: rgba(220,38,38,0.15);
            color: #f87171;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }
        
        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            vertical-align: middle;
        }
        th {
            color: #fbbf24;
            font-weight: 600;
            font-size: 12px;
        }
        td {
            font-size: 13px;
        }
        
        .member-row {
            cursor: pointer;
            transition: background 0.1s;
        }
        .member-row:hover {
            background: rgba(251,191,36,0.1);
        }
        
        /* TH Icon */
        .th-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .th-icon-small {
            width: 24px;
            height: 24px;
            margin-right: 4px;
        }
        .player-th {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: bold;
        }
        
        /* Tag copy */
        .tag-copy {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .tag-copy:hover {
            background: #f59e0b;
            color: #0f172a;
        }
        
        .badge {
            background: rgba(251,191,36,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #fbbf24;
        }
        
        /* Progress bar */
        .progress-bar {
            background: #1e293b;
            border-radius: 10px;
            height: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            height: 100%;
            border-radius: 10px;
        }
        
        .back-btn {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 16px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab {
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        .tab.active {
            background: #f59e0b;
            color: #0f172a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        .flex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        @media (max-width: 640px) {
            body { padding: 12px; }
            .header { flex-direction: column; align-items: center; text-align: center; }
            th, td { font-size: 11px; padding: 8px 4px; }
            .th-icon { width: 28px; height: 28px; }
            .search-box button { padding: 12px 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>🏰 Clash of Clans Tracker</h1>
            <p>Dengan Ikon Town Hall & Basis Tukang</p>
        </div>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">📡 Panel: <span id="panelStatus" class="offline">● Offline</span></div>
        <div class="status-item">🔑 Token: <span id="tokenStatus">-</span></div>
        <button onclick="checkPanel()" style="background:#3b82f6; border:none; padding:4px 12px; border-radius:16px; font-size:11px; cursor:pointer;">Test</button>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="clan">🏠 Clan & Anggota</div>
        <div class="tab" data-tab="player">🎮 Cari Pemain</div>
    </div>
    
    <!-- Tab Clan & Anggota -->
    <div id="tab-clan" class="tab-content active">
        <div class="card">
            <div class="card-header"><h3>🏠 Cari Klan</h3></div>
            <div class="search-box">
                <input type="text" id="clanTag" placeholder="Masukkan tag klan...">
                <button onclick="searchClan()">🔍 Cari</button>
            </div>
            <div id="clanResult" class="result-box empty-state">Masukkan tag klan untuk melihat info & anggota</div>
        </div>
    </div>
    
    <!-- Tab Cari Pemain -->
    <div id="tab-player" class="tab-content">
        <div class="card">
            <div class="card-header"><h3>🎮 Cari Pemain</h3></div>
            <div class="search-box">
                <input type="text" id="playerTag" placeholder="Masukkan tag pemain...">
                <button onclick="searchPlayer()">🔍 Cari</button>
            </div>
            <div id="playerResult" class="result-box empty-state">Masukkan tag pemain untuk melihat detail + pencapaian</div>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/coc';
let currentClanData = null;
let currentMembers = [];

// ====================== TH ICON BUILDER ======================
// Fungsi untuk mendapatkan gambar Town Hall 1-18 plus level 15,16,17,18 modern
function getThIconUrl(thLevel) {
    if (!thLevel || thLevel < 1) return 'https://raw.githubusercontent.com/clashking/coc-images/master/town-hall/1.png';
    // Pastikan ada folder/URL yang valid. Kita gunakan CDN dari clashking atau direktori images.
    // Sumber gambar asli dari repo clashking cukup stabil
    if (thLevel >= 1 && thLevel <= 18) {
        return `https://raw.githubusercontent.com/clashking/coc-images/master/town-hall/${thLevel}.png`;
    }
    return `https://raw.githubusercontent.com/clashking/coc-images/master/town-hall/1.png`;
}

// Komponen gambar TH dalam baris (table, detail, dll)
function thImage(thLevel, sizeClass = 'th-icon') {
    if (!thLevel || thLevel < 1) return '';
    const url = getThIconUrl(thLevel);
    return `<img src="${url}" class="${sizeClass}" alt="TH${thLevel}" title="Town Hall ${thLevel}" onerror="this.src='https://raw.githubusercontent.com/clashking/coc-images/master/town-hall/14.png'">`;
}

// Role mapping Indonesia
function mapRole(roleEn) {
    const map = {
        'leader': 'Pemimpin',
        'coLeader': 'Wakil Pemimpin',
        'admin': 'Senior',
        'member': 'Anggota'
    };
    return map[roleEn] || roleEn;
}

// Achievement Indonesia
function translateAchievement(nameEn) {
    const dict = {
        'Bigger & Better': 'Lebih Besar & Lebih Baik',
        'Nice and Tidy': 'Rapi dan Bersih',
        'Gold Rush': 'Demam Emas',
        'Elixir Escapade': 'Petualangan Elixir',
        'Heroic Heist': 'Pencurian Heroik',
        'Conqueror': 'Penakluk',
        'Unbreakable': 'Tak Terkalahkan',
        'League All-Star': 'Bintang Liga',
        'War Hero': 'Pahlawan Perang',
        'Aggressive Capitalism': 'Kapitalisme Agresif',
        'Sharing is Caring': 'Berbagi itu Peduli',
        'Friend in Need': 'Teman dalam Kebutuhan',
        'Games Champion': 'Juara Permainan',
        'Champion Builder': 'Pembangun Juara',
        'Clan Capital Enthusiast': 'Pecinta Ibu Kota',
        'Well Seasoned': 'Berkualitas',
        'Might of the Builder': 'Kekuatan Pembangun',
        'Exalted Architect': 'Arsitek Terhormat'
    };
    return dict[nameEn] || nameEn;
}

// ========== PANEL STATUS ==========
async function checkPanel() {
    const panelSpan = document.getElementById('panelStatus');
    const tokenSpan = document.getElementById('tokenStatus');
    panelSpan.innerHTML = '● Checking...';
    try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        panelSpan.innerHTML = '<span class="online">● Online</span>';
        tokenSpan.innerHTML = data.token ? '✅ Ada' : '❌ Tidak ada';
    } catch (err) {
        panelSpan.innerHTML = '<span class="offline">● Offline</span>';
        tokenSpan.innerHTML = '❌ Gagal';
    }
}

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
});

// ========== CLAN & MEMBERS ==========
async function searchClan() {
    let tag = document.getElementById('clanTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    const div = document.getElementById('clanResult');
    div.innerHTML = '<div class="loading">⏳ Loading clan info...</div>';
    try {
        const clanRes = await fetch(`${API_BASE}/clan?tag=${encodeURIComponent(tag)}`);
        const clanData = await clanRes.json();
        if (clanData.error || clanData.reason) throw new Error(clanData.reason || 'Gagal ambil clan');
        currentClanData = clanData;
        const membersRes = await fetch(`${API_BASE}/members?tag=${encodeURIComponent(tag)}`);
        const membersData = await membersRes.json();
        if (membersData.error || membersData.reason) throw new Error(membersData.reason || 'Gagal ambil anggota');
        currentMembers = membersData.items || [];
        displayClanAndMembers(clanData, currentMembers);
    } catch (err) {
        div.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

function displayClanAndMembers(clan, members) {
    const div = document.getElementById('clanResult');
    let clanHtml = `
        <div style="margin-bottom:24px;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
                <strong style="font-size:20px;">${escapeHtml(clan.name)}</strong>
                <span class="badge">${clan.tag}</span>
                <span class="tag-copy" onclick="copyToClipboard('${clan.tag}')">📋 Copy Tag</span>
            </div>
            <div class="flex-grid">
                <div><span style="color:#94a3b8;">Level</span><br><strong>${clan.clanLevel}</strong></div>
                <div><span style="color:#94a3b8;">Anggota</span><br><strong>${clan.members}/50</strong></div>
                <div><span style="color:#94a3b8;">Trofi</span><br><strong>${clan.clanPoints?.toLocaleString()}</strong></div>
                <div><span style="color:#94a3b8;">Win Streak</span><br><strong>${clan.warWinStreak}</strong></div>
            </div>
            <div style="font-size:12px;">📍 ${clan.location?.name || '-'} | 🔒 ${clan.type}</div>
            ${clan.description ? `<div style="margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.1);"><span style="color:#94a3b8;">📝</span> ${escapeHtml(clan.description.substring(0, 100))}${clan.description.length > 100 ? '...' : ''}</div>` : ''}
        </div>
        <div><strong>👥 Anggota (${members.length})</strong></div>
        <div class="table-wrapper" style="margin-top:12px;">
            <table>
                <thead><tr><th>No</th><th>Nama & TH</th><th>Peran</th><th>🏆</th><th>Donasi</th></tr></thead>
                <tbody>
    `;
    members.forEach((m, i) => {
        let icon = { leader:'👑', coLeader:'⭐', admin:'🔹', member:'🟢' }[m.role] || '•';
        let roleId = mapRole(m.role);
        // Tampilkan gambar TH di samping nama
        const thImg = thImage(m.townHallLevel, 'th-icon-small');
        clanHtml += `<tr class="member-row" onclick='showMemberDetail("${m.tag.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}", "${escapeHtml(m.name).replace(/'/g, "\\'")}")'>
            <td>${i+1}</td>
            <td>${icon} ${escapeHtml(m.name)} ${thImg} (TH${m.townHallLevel})</td>
            <td>${roleId}</td>
            <td>${m.trophies.toLocaleString()}</td>
            <td>${m.donations.toLocaleString()}</td>
        </tr>`;
    });
    clanHtml += `</tbody></table></div><div style="margin-top:12px; text-align:center; font-size:11px; color:#64748b;">✨ Klik anggota untuk lihat detail + pencapaian + basis tukang ✨</div>`;
    div.innerHTML = clanHtml;
}

// ========== DETAIL MEMBER + BUILDER BASE + TH ICON ==========
async function showMemberDetail(tag, name) {
    const div = document.getElementById('clanResult');
    div.innerHTML = '<div class="loading">⏳ Loading detail...</div>';
    try {
        const res = await fetch(`${API_BASE}/player?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error || data.reason) throw new Error(data.reason || 'Gagal');
        
        const thImgBig = thImage(data.townHallLevel, 'th-icon');
        const builderHall = data.builderHallLevel || 'Tidak memiliki';
        const builderTrophies = data.builderBaseTrophies || 0;
        const builderBest = data.bestBuilderBaseTrophies || 0;
        const versusWins = data.versusBattleWins || 0;
        
        let achievementsHtml = '';
        if (data.achievements && data.achievements.length > 0) {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian (Achievements)</strong><div style="margin-top:12px;">';
            data.achievements.slice(0,15).forEach(ach => {
                let percent = (ach.value / ach.target) * 100;
                let indoName = translateAchievement(ach.name);
                achievementsHtml += `
                    <div style="margin-bottom:14px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>${indoName}</span>
                            <span>${ach.value.toLocaleString()}/${ach.target.toLocaleString()}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    </div>
                `;
            });
            achievementsHtml += '</div></div>';
        } else {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian</strong><div style="margin-top:8px; color:#64748b;">Belum ada achievement</div></div>';
        }
        
        let heroesHtml = '';
        if (data.heroes && data.heroes.length > 0) {
            heroesHtml = '<div style="margin-top:20px;"><strong>🦸 Heroes</strong><div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;">';
            data.heroes.forEach(h => {
                if (h.village === 'home') {
                    heroesHtml += `<div style="background:#1e293b; padding:8px 12px; border-radius:12px;"><strong>${h.name}</strong><br>Lv ${h.level}/${h.maxLevel}</div>`;
                }
            });
            heroesHtml += '</div></div>';
        }
        
        div.innerHTML = `
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
                    <strong style="font-size:18px;">🎮 ${escapeHtml(data.name)}</strong>
                    <span class="tag-copy" onclick="copyToClipboard('${data.tag}')">📋 Copy Tag</span>
                </div>
                <div class="player-th">
                    ${thImgBig} Town Hall ${data.townHallLevel}
                </div>
                <div class="flex-grid" style="margin-top:16px;">
                    <div><span style="color:#94a3b8;">Level XP</span><br><strong>${data.expLevel}</strong></div>
                    <div><span style="color:#94a3b8;">Trofi</span><br><strong>${data.trophies.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Best Trofi</span><br><strong>${data.bestTrophies?.toLocaleString() || '-'}</strong></div>
                    <div><span style="color:#94a3b8;">Bintang Perang</span><br><strong>${data.warStars}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi</span><br><strong>${data.donations.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi Diterima</span><br><strong>${data.donationsReceived.toLocaleString()}</strong></div>
                </div>
                <div style="margin-top:16px; background:#1e293b; border-radius:16px; padding:12px;">
                    <strong>🏗️ BASIS TUKANG</strong><br>
                    Balai Tukang: ${builderHall}<br>
                    Trofi Tukang: ${builderTrophies.toLocaleString()} (Terbaik: ${builderBest.toLocaleString()})<br>
                    Kemenangan Versus: ${versusWins.toLocaleString()}
                </div>
                ${heroesHtml}
                ${achievementsHtml}
                <button class="back-btn" onclick="backToClan()">← Kembali ke daftar clan</button>
            </div>
        `;
    } catch (err) {
        div.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

function backToClan() {
    if (currentClanData && currentMembers) {
        displayClanAndMembers(currentClanData, currentMembers);
    } else {
        document.getElementById('clanResult').innerHTML = '<div class="empty-state">Masukkan tag klan untuk memulai</div>';
    }
}

// ========== SEARCH PLAYER (dengan TH icon) ==========
async function searchPlayer() {
    let tag = document.getElementById('playerTag').value.trim();
    if (!tag) return;
    if (!tag.startsWith('#')) tag = '#' + tag;
    const div = document.getElementById('playerResult');
    div.innerHTML = '<div class="loading">⏳ Loading...</div>';
    try {
        const res = await fetch(`${API_BASE}/player?tag=${encodeURIComponent(tag)}`);
        const data = await res.json();
        if (data.error || data.reason) throw new Error(data.reason || 'Gagal');
        
        const thImgBig = thImage(data.townHallLevel, 'th-icon');
        const builderHall = data.builderHallLevel || 'Tidak memiliki';
        const builderTrophies = data.builderBaseTrophies || 0;
        const builderBest = data.bestBuilderBaseTrophies || 0;
        const versusWins = data.versusBattleWins || 0;
        
        let achievementsHtml = '';
        if (data.achievements && data.achievements.length > 0) {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian (Achievements)</strong><div style="margin-top:12px;">';
            data.achievements.slice(0,15).forEach(ach => {
                let percent = (ach.value / ach.target) * 100;
                let indoName = translateAchievement(ach.name);
                achievementsHtml += `
                    <div style="margin-bottom:14px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>${indoName}</span>
                            <span>${ach.value.toLocaleString()}/${ach.target.toLocaleString()}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    </div>
                `;
            });
            achievementsHtml += '</div></div>';
        } else {
            achievementsHtml = '<div style="margin-top:20px;"><strong>🏆 Pencapaian</strong><div style="margin-top:8px; color:#64748b;">Belum ada achievement</div></div>';
        }
        
        let heroesHtml = '';
        if (data.heroes && data.heroes.length > 0) {
            heroesHtml = '<div style="margin-top:20px;"><strong>🦸 Heroes</strong><div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;">';
            data.heroes.forEach(h => {
                if (h.village === 'home') {
                    heroesHtml += `<div style="background:#1e293b; padding:8px 12px; border-radius:12px;"><strong>${h.name}</strong><br>Lv ${h.level}/${h.maxLevel}</div>`;
                }
            });
            heroesHtml += '</div></div>';
        }
        
        div.innerHTML = `
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
                    <strong style="font-size:18px;">🎮 ${escapeHtml(data.name)}</strong>
                    <span class="tag-copy" onclick="copyToClipboard('${data.tag}')">📋 Copy Tag</span>
                </div>
                <div class="player-th">
                    ${thImgBig} Town Hall ${data.townHallLevel}
                </div>
                <div class="flex-grid" style="margin-top:16px;">
                    <div><span style="color:#94a3b8;">Level XP</span><br><strong>${data.expLevel}</strong></div>
                    <div><span style="color:#94a3b8;">Trofi</span><br><strong>${data.trophies.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Best Trofi</span><br><strong>${data.bestTrophies?.toLocaleString() || '-'}</strong></div>
                    <div><span style="color:#94a3b8;">Bintang Perang</span><br><strong>${data.warStars}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi</span><br><strong>${data.donations.toLocaleString()}</strong></div>
                    <div><span style="color:#94a3b8;">Donasi Diterima</span><br><strong>${data.donationsReceived.toLocaleString()}</strong></div>
                </div>
                <div style="margin-top:16px; background:#1e293b; border-radius:16px; padding:12px;">
                    <strong>🏗️ BASIS TUKANG</strong><br>
                    Balai Tukang: ${builderHall}<br>
                    Trofi Tukang: ${builderTrophies.toLocaleString()} (Terbaik: ${builderBest.toLocaleString()})<br>
                    Kemenangan Versus: ${versusWins.toLocaleString()}
                </div>
                ${heroesHtml}
                ${achievementsHtml}
            </div>
        `;
    } catch (err) {
        div.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    const notification = document.createElement('div');
    notification.textContent = '✅ Tag disalin!';
    notification.style.position = 'fixed';
    notification.style.bottom = '20px';
    notification.style.left = '50%';
    notification.style.transform = 'translateX(-50%)';
    notification.style.background = '#f59e0b';
    notification.style.color = '#0f172a';
    notification.style.padding = '8px 20px';
    notification.style.borderRadius = '40px';
    notification.style.fontWeight = 'bold';
    notification.style.zIndex = '9999';
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 1500);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

checkPanel();
setInterval(checkPanel, 30000);
</script>
